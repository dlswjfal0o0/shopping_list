<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>쇼핑리스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 220px;
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14);
    --text-primary: #1A1A18;
    --text-secondary: #6B6B67;
    --text-hint: #ABABAB;
    --accent-must: #1D9E75;
    --accent-must-bg: #E1F5EE;
    --accent-must-mid: #9FE1CB;
    --accent-want: #D85A30;
    --accent-want-bg: #FAECE7;
    --accent-want-mid: #F5C4B3;
    --nav-active-bg: #F0F0EC;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    z-index: 10;
  }

  .sidebar-brand {
    padding: 1.5rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .brand-icon {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text-primary);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-icon svg { flex-shrink: 0; }
  .brand-sub {
    font-size: 11px;
    color: var(--text-hint);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }

  .sidebar-nav {
    padding: 1rem 0.75rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    text-decoration: none;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 400;
    transition: background 0.12s, color 0.12s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--nav-active-bg); color: var(--text-primary); }
  .nav-item.active { background: var(--nav-active-bg); color: var(--text-primary); font-weight: 500; }

  .nav-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .nav-label { flex: 1; line-height: 1.3; }
  .nav-label-main { display: block; }
  .nav-label-sub {
    display: block;
    font-size: 11px;
    color: var(--text-hint);
    font-weight: 400;
    margin-top: 2px;
  }
  .nav-item.active .nav-label-sub { color: var(--text-secondary); }

  .nav-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .badge-must { background: var(--accent-must-bg); color: #0F6E56; }
  .badge-want { background: var(--accent-want-bg); color: #993C1D; }

  .nav-divider {
    height: 1px;
    background: var(--border);
    margin: 6px 0;
  }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 2rem 2.5rem;
    max-width: calc(100vw - var(--sidebar-w));
  }

  .page { display: none; }
  .page.active { display: block; }

  /* ── HOME PAGE ── */
  .home-greeting {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text-primary);
    margin-bottom: 0.25rem;
    letter-spacing: -0.5px;
  }
  .home-date {
    font-size: 13px;
    color: var(--text-hint);
    margin-bottom: 2rem;
  }

  .home-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .home-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s, transform 0.12s;
    position: relative;
    overflow: hidden;
  }
  .home-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
  }
  .home-card.must::before { background: var(--accent-must); }
  .home-card.want::before { background: var(--accent-want); }
  .home-card:hover { border-color: var(--border-md); transform: translateY(-2px); }

  .home-card-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .home-card-tag.must { color: var(--accent-must); }
  .home-card-tag.want { color: var(--accent-want); }

  .home-card-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    color: var(--text-primary);
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .home-card-meta {
    font-size: 12px;
    color: var(--text-hint);
  }

  .home-total-card {
    background: var(--text-primary);
    border-radius: var(--radius-lg);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  .home-total-label {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 4px;
  }
  .home-total-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: #fff;
    letter-spacing: -1px;
  }
  .home-total-right {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    text-align: right;
  }

  .home-section-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .home-store-list {
    background: var(--surface);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .home-store-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .home-store-row:last-child { border-bottom: none; }
  .home-store-name {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .home-store-cat { font-size: 11px; color: var(--text-hint); margin-left: 4px; font-weight: 400; }
  .home-store-amt { font-weight: 500; color: var(--text-secondary); }
  .home-empty { padding: 2rem; text-align: center; color: var(--text-hint); font-size: 13px; }

  /* ── SHOP PAGE ── */
  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    gap: 1rem;
  }
  .page-title-area {}
  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .page-title-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .page-subtitle { font-size: 13px; color: var(--text-hint); }

  .page-summary {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .page-total-badge {
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
  }
  .badge-must-lg { background: var(--accent-must-bg); color: #085041; }
  .badge-want-lg { background: var(--accent-want-bg); color: #712B13; }

  .add-store-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border-md);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.12s;
    white-space: nowrap;
  }
  .add-store-btn:hover { background: var(--nav-active-bg); }

  .stores-list { display: flex; flex-direction: column; gap: 1rem; }

  /* ── STORE CARD ── */
  .store-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .store-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.875rem 1.25rem;
    border-bottom: 1px solid var(--border);
    gap: 0.5rem;
  }
  .store-name-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .store-name-input {
    font-size: 15px;
    font-weight: 500;
    border: none;
    background: transparent;
    color: var(--text-primary);
    outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    min-width: 0;
    flex: 1;
  }
  .store-name-input::placeholder { color: var(--text-hint); }
  .store-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .store-subtotal {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .store-subtotal em { font-style: normal; color: var(--text-primary); }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-hint);
    padding: 4px 5px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    transition: color 0.12s, background 0.12s;
    font-size: 15px;
    line-height: 1;
  }
  .icon-btn:hover { color: var(--text-primary); background: var(--nav-active-bg); }
  .icon-btn.danger:hover { color: #993C1D; background: var(--accent-want-bg); }

  .items-table { width: 100%; border-collapse: collapse; }
  .items-table th {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-hint);
    text-align: left;
    padding: 8px 1.25rem;
    background: #FAFAF8;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .items-table th.right { text-align: right; }
  .items-table td {
    font-size: 14px;
    color: var(--text-primary);
    padding: 9px 1.25rem;
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }
  .items-table td.right { text-align: right; }
  .cell-input {
    background: transparent;
    border: none;
    outline: none;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    width: 100%;
  }
  .cell-input::placeholder { color: var(--text-hint); }
  .price-input { text-align: right; width: 100px; }
  .add-item-row td { padding: 7px 1.25rem; border-top: 1px solid var(--border); }
  .add-item-btn {
    display: flex; align-items: center; gap: 5px;
    background: none; border: none;
    font-size: 13px; color: var(--text-hint);
    cursor: pointer; padding: 3px 0;
    font-family: 'Noto Sans KR', sans-serif;
    transition: color 0.12s;
  }
  .add-item-btn:hover { color: var(--text-primary); }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-hint);
    font-size: 14px;
  }
  .empty-state svg { margin-bottom: 10px; opacity: 0.35; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    width: 340px;
    border: 1px solid var(--border-md);
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
  .modal label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 5px; font-weight: 500; }
  .modal input[type=text] {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.12s;
  }
  .modal input[type=text]:focus { border-color: #888; }
  .color-row { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .color-swatch {
    width: 26px; height: 26px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: border-color 0.12s, transform 0.1s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text-primary); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .modal-actions button {
    padding: 8px 18px; font-size: 13px;
    border-radius: var(--radius-sm); cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    border: 1px solid var(--border-md);
    background: var(--surface); color: var(--text-secondary);
    transition: background 0.12s;
  }
  .modal-actions button:hover { background: var(--bg); }
  .modal-actions button.primary {
    background: var(--text-primary); color: #fff; border-color: var(--text-primary);
  }
  .modal-actions button.primary:hover { background: #333; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    :root { --sidebar-w: 0px; }
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 1rem; max-width: 100vw; }
    .home-cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <svg class="nav-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 2h12l-1.5 9H4.5L3 2Z" stroke="#1A1A18" stroke-width="1.3" stroke-linejoin="round"/>
        <circle cx="6.5" cy="15.5" r="1.25" fill="#1A1A18"/>
        <circle cx="12.5" cy="15.5" r="1.25" fill="#1A1A18"/>
        <path d="M1 2h2" stroke="#1A1A18" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      장보기
    </div>
    <div class="brand-sub">쇼핑리스트 관리</div>
  </div>
  <div class="sidebar-nav">
    <button class="nav-item active" onclick="goTo('home')" id="nav-home">
      <svg class="nav-icon" viewBox="0 0 18 18" fill="none">
        <path d="M2 8L9 2l7 6v8a1 1 0 01-1 1H3a1 1 0 01-1-1V8Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M6 17v-6h6v6" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label">
        <span class="nav-label-main">홈</span>
        <span class="nav-label-sub" id="home-sub">전체 현황</span>
      </span>
    </button>

    <div class="nav-divider"></div>

    <button class="nav-item" onclick="goTo('must')" id="nav-must">
      <svg class="nav-icon" viewBox="0 0 18 18" fill="none">
        <path d="M9 2L10.8 6.6L16 7.2L12.2 10.8L13.4 16L9 13.4L4.6 16L5.8 10.8L2 7.2L7.2 6.6L9 2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label">
        <span class="nav-label-main">사야하는 것</span>
      </span>
      <span class="nav-badge badge-must" id="badge-must">0원</span>
    </button>

    <button class="nav-item" onclick="goTo('want')" id="nav-want">
      <svg class="nav-icon" viewBox="0 0 18 18" fill="none">
        <path d="M9 15s-7-4.5-7-8.5C2 4 3.5 2 6 2c1.5 0 2.5.8 3 2 .5-1.2 1.5-2 3-2 2.5 0 4 2 4 4.5C16 10.5 9 15 9 15Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label">
        <span class="nav-label-main">사고싶은 것</span>
      </span>
      <span class="nav-badge badge-want" id="badge-want">0원</span>
    </button>
  </div>
</nav>

<!-- MAIN -->
<main class="main">

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div class="home-greeting">안녕하세요 👋</div>
    <div class="home-date" id="home-date-text"></div>

    <div class="home-cards">
      <div class="home-card must" onclick="goTo('must')" style="cursor:pointer;">
        <div class="home-card-tag must">
          <svg width="13" height="13" viewBox="0 0 18 18" fill="none"><path d="M9 2L10.8 6.6L16 7.2L12.2 10.8L13.4 16L9 13.4L4.6 16L5.8 10.8L2 7.2L7.2 6.6L9 2Z" stroke="#1D9E75" stroke-width="1.5" stroke-linejoin="round"/></svg>
          사야하는 것
        </div>
        <div class="home-card-amount" id="home-must-amount">0원</div>
        <div class="home-card-meta" id="home-must-meta">상품 0개 · 쇼핑몰 0곳</div>
      </div>
      <div class="home-card want" onclick="goTo('want')" style="cursor:pointer;">
        <div class="home-card-tag want">
          <svg width="13" height="13" viewBox="0 0 18 18" fill="none"><path d="M9 15s-7-4.5-7-8.5C2 4 3.5 2 6 2c1.5 0 2.5.8 3 2 .5-1.2 1.5-2 3-2 2.5 0 4 2 4 4.5C16 10.5 9 15 9 15Z" stroke="#D85A30" stroke-width="1.5" stroke-linejoin="round"/></svg>
          사고싶은 것
        </div>
        <div class="home-card-amount" id="home-want-amount">0원</div>
        <div class="home-card-meta" id="home-want-meta">상품 0개 · 쇼핑몰 0곳</div>
      </div>
    </div>

    <div class="home-total-card">
      <div>
        <div class="home-total-label">총 예상 지출</div>
        <div class="home-total-amount" id="home-grand-total">0원</div>
      </div>
      <div class="home-total-right" id="home-total-right">상품을 추가하면<br>여기에 표시됩니다</div>
    </div>

    <div class="home-section-title">쇼핑몰별 요약</div>
    <div class="home-store-list" id="home-store-list">
      <div class="home-empty">아직 추가된 쇼핑몰이 없어요</div>
    </div>
  </div>

  <!-- MUST PAGE -->
  <div class="page" id="page-must">
    <div class="page-header">
      <div class="page-title-area">
        <div class="page-title">
          <span class="page-title-dot" style="background:var(--accent-must)"></span>
          사야하는 것
        </div>
        <div class="page-subtitle">꼭 구매해야 할 상품 목록</div>
      </div>
      <div class="page-summary">
        <span class="page-total-badge badge-must-lg" id="must-total-badge">합계 0원</span>
        <button class="add-store-btn" onclick="openModal('must')">+ 쇼핑몰 추가</button>
      </div>
    </div>
    <div class="stores-list" id="must-stores"></div>
  </div>

  <!-- WANT PAGE -->
  <div class="page" id="page-want">
    <div class="page-header">
      <div class="page-title-area">
        <div class="page-title">
          <span class="page-title-dot" style="background:var(--accent-want)"></span>
          사고싶은 것
        </div>
        <div class="page-subtitle">언젠가 사고 싶은 상품 목록</div>
      </div>
      <div class="page-summary">
        <span class="page-total-badge badge-want-lg" id="want-total-badge">합계 0원</span>
        <button class="add-store-btn" onclick="openModal('want')">+ 쇼핑몰 추가</button>
      </div>
    </div>
    <div class="stores-list" id="want-stores"></div>
  </div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h3>쇼핑몰 추가</h3>
    <label>쇼핑몰 이름</label>
    <input type="text" id="storeNameInput" placeholder="예: 쿠팡, 마켓컬리, 올리브영" />
    <label>색상</label>
    <div class="color-row" id="colorRow"></div>
    <div class="modal-actions">
      <button onclick="closeModal()">취소</button>
      <button class="primary" onclick="confirmAddStore()">추가</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#1D9E75','#378ADD','#D85A30','#D4537E','#7F77DD','#BA7517','#639922','#E24B4A','#5DCAA5','#85B7EB'];

let data = {
  must: JSON.parse(localStorage.getItem('sl_must') || '[]'),
  want: JSON.parse(localStorage.getItem('sl_want') || '[]')
};

let modalCtx = 'must';
let selectedColor = COLORS[0];
let storeCounter = parseInt(localStorage.getItem('sl_counter') || '0');
let currentPage = 'home';

function save() {
  localStorage.setItem('sl_must', JSON.stringify(data.must));
  localStorage.setItem('sl_want', JSON.stringify(data.want));
  localStorage.setItem('sl_counter', String(storeCounter));
}

function fmt(n) {
  if (!n) return '0원';
  return n.toLocaleString('ko-KR') + '원';
}

function storeTotal(store) {
  return store.items.reduce((s, i) => s + (parseFloat(i.price) || 0), 0);
}

function categoryTotal(cat) {
  return data[cat].reduce((s, store) => s + storeTotal(store), 0);
}

function categoryItems(cat) {
  return data[cat].reduce((s, store) => s + store.items.length, 0);
}

// ── NAVIGATION ──
function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  currentPage = page;
  if (page === 'home') renderHome();
  else renderPage(page);
}

// ── HOME ──
function renderHome() {
  const mustTotal = categoryTotal('must');
  const wantTotal = categoryTotal('want');
  const grand = mustTotal + wantTotal;
  const mustItems = categoryItems('must');
  const wantItems = categoryItems('want');

  document.getElementById('home-must-amount').textContent = fmt(mustTotal);
  document.getElementById('home-must-meta').textContent = `상품 ${mustItems}개 · 쇼핑몰 ${data.must.length}곳`;
  document.getElementById('home-want-amount').textContent = fmt(wantTotal);
  document.getElementById('home-want-meta').textContent = `상품 ${wantItems}개 · 쇼핑몰 ${data.want.length}곳`;
  document.getElementById('home-grand-total').textContent = fmt(grand);

  const totalItems = mustItems + wantItems;
  document.getElementById('home-total-right').innerHTML =
    totalItems > 0
      ? `총 ${totalItems}개 상품<br>${data.must.length + data.want.length}개 쇼핑몰`
      : '상품을 추가하면<br>여기에 표시됩니다';

  const allStores = [
    ...data.must.map(s => ({ ...s, cat: 'must' })),
    ...data.want.map(s => ({ ...s, cat: 'want' }))
  ].filter(s => s.items.length > 0 || true);

  const list = document.getElementById('home-store-list');
  if (allStores.length === 0) {
    list.innerHTML = '<div class="home-empty">아직 추가된 쇼핑몰이 없어요</div>';
    return;
  }
  list.innerHTML = allStores.map(s => `
    <div class="home-store-row">
      <div class="home-store-name">
        <div class="dot" style="background:${s.color}"></div>
        ${s.name || '이름 없음'}
        <span class="home-store-cat">${s.cat === 'must' ? '사야하는 것' : '사고싶은 것'}</span>
      </div>
      <div class="home-store-amt">${fmt(storeTotal(s))}</div>
    </div>
  `).join('');
}

// ── SIDEBAR BADGES ──
function updateBadges() {
  document.getElementById('badge-must').textContent = fmt(categoryTotal('must'));
  document.getElementById('badge-want').textContent = fmt(categoryTotal('want'));
  const d = new Date();
  document.getElementById('home-date-text').textContent =
    d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
}

// ── RENDER PAGE ──
function renderPage(cat) {
  const total = categoryTotal(cat);
  document.getElementById(cat + '-total-badge').textContent = '합계 ' + fmt(total);
  updateBadges();

  const container = document.getElementById(cat + '-stores');
  if (data[cat].length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect x="6" y="4" width="28" height="34" rx="3" stroke="#888" stroke-width="1.5"/>
          <path d="M14 14h12M14 20h12M14 26h8" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div>쇼핑몰을 추가하고 상품을 기록해보세요</div>
      </div>`;
    return;
  }

  container.innerHTML = data[cat].map(store => `
    <div class="store-card" id="sc-${store.id}">
      <div class="store-header">
        <div class="store-name-wrap">
          <div class="dot" style="background:${store.color};width:10px;height:10px;flex-shrink:0;"></div>
          <input class="store-name-input" value="${escH(store.name)}" placeholder="쇼핑몰 이름"
            oninput="updateStoreName('${cat}', ${store.id}, this.value)" />
        </div>
        <div class="store-right">
          <span class="store-subtotal">소계 <em id="sub-${store.id}">${fmt(storeTotal(store))}</em></span>
          <button class="icon-btn danger" onclick="deleteStore('${cat}', ${store.id})" title="쇼핑몰 삭제">
            <svg width="15" height="15" viewBox="0 0 18 18" fill="none"><path d="M3 5h12M7 5V3h4v2M14 5l-.8 10H4.8L4 5" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <table class="items-table">
        <thead>
          <tr>
            <th style="width:34%">상품명</th>
            <th style="width:38%">세부정보</th>
            <th class="right" style="width:20%">가격</th>
            <th style="width:8%"></th>
          </tr>
        </thead>
        <tbody id="tbody-${store.id}">
          ${store.items.map(item => itemRow(cat, store.id, item)).join('')}
          <tr class="add-item-row">
            <td colspan="4">
              <button class="add-item-btn" onclick="addItem('${cat}', ${store.id})">
                <svg width="13" height="13" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                상품 추가
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  `).join('');
}

function itemRow(cat, storeId, item) {
  return `
    <tr id="row-${item.id}">
      <td><input class="cell-input" value="${escH(item.name)}" placeholder="상품명"
        oninput="updateItem('${cat}',${storeId},${item.id},'name',this.value)" /></td>
      <td><input class="cell-input" value="${escH(item.detail)}" placeholder="색상, 사이즈 등"
        oninput="updateItem('${cat}',${storeId},${item.id},'detail',this.value)" /></td>
      <td class="right"><input class="cell-input price-input" type="number" min="0"
        value="${item.price}" placeholder="0"
        oninput="updateItem('${cat}',${storeId},${item.id},'price',this.value)" /></td>
      <td style="text-align:center;">
        <button class="icon-btn danger" onclick="deleteItem('${cat}',${storeId},${item.id})" title="삭제">
          <svg width="13" height="13" viewBox="0 0 18 18" fill="none"><path d="M3 9h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </td>
    </tr>`;
}

function escH(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── STORE CRUD ──
function updateStoreName(cat, id, val) {
  const s = data[cat].find(s => s.id === id);
  if (s) { s.name = val; save(); updateBadges(); }
}

function deleteStore(cat, id) {
  if (!confirm('이 쇼핑몰을 삭제할까요?')) return;
  data[cat] = data[cat].filter(s => s.id !== id);
  save(); renderPage(cat);
}

// ── ITEM CRUD ──
function addItem(cat, storeId) {
  const store = data[cat].find(s => s.id === storeId);
  store.items.push({ id: Date.now(), name: '', detail: '', price: '' });
  save(); renderPage(cat);
}

function deleteItem(cat, storeId, itemId) {
  const store = data[cat].find(s => s.id === storeId);
  store.items = store.items.filter(i => i.id !== itemId);
  save(); renderPage(cat);
}

function updateItem(cat, storeId, itemId, field, val) {
  const store = data[cat].find(s => s.id === storeId);
  const item = store.items.find(i => i.id === itemId);
  if (item) {
    item[field] = val;
    save();
    const subEl = document.getElementById('sub-' + storeId);
    if (subEl) subEl.textContent = fmt(storeTotal(store));
    document.getElementById(cat + '-total-badge').textContent = '합계 ' + fmt(categoryTotal(cat));
    updateBadges();
  }
}

// ── MODAL ──
function openModal(cat) {
  modalCtx = cat;
  selectedColor = COLORS[data[cat].length % COLORS.length];
  document.getElementById('storeNameInput').value = '';
  renderColorRow();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('storeNameInput').focus(), 60);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.getElementById('storeNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAddStore();
  if (e.key === 'Escape') closeModal();
});

function renderColorRow() {
  document.getElementById('colorRow').innerHTML = COLORS.map(c =>
    `<div class="color-swatch${c === selectedColor ? ' selected' : ''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(c) {
  selectedColor = c;
  renderColorRow();
}

function confirmAddStore() {
  const name = document.getElementById('storeNameInput').value.trim();
  if (!name) { document.getElementById('storeNameInput').focus(); return; }
  data[modalCtx].push({ id: ++storeCounter, name, color: selectedColor, items: [] });
  save(); closeModal(); renderPage(modalCtx);
}

// ── INIT ──
updateBadges();
renderHome();
</script>
</body>
</html>
